<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CVC Vial - Gesti\u00f3n Profesional</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F0F4FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CVC Vial">
    <link rel="apple-touch-icon" href="image.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#F59E0B',
                        neutral: {
                            base: '#F0F4FF',
                            text: '#1E1B4B',
                            muted: '#6B7280',
                        },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --indigo-primary: #4F46E5;
            --indigo-dark: #3730A3;
            --indigo-light: #818CF8;
            --amber-accent: #F59E0B;
            --amber-dark: #D97706;
            --bg-neutral: #F0F4FF;
            --success-green: #10B981;
        }

        body {
            background-color: var(--bg-neutral);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.08) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.06) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(129, 140, 248, 0.04) 0px, transparent 60%);
            color: #1E1B4B;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        .soft-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px -5px rgba(79, 70, 229, 0.08), 0 4px 10px -2px rgba(79, 70, 229, 0.04);
        }

        .tab-active {
            color: var(--indigo-primary);
            position: relative;
            font-weight: 800;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 30%;
            width: 40%;
            height: 4px;
            background: linear-gradient(90deg, var(--indigo-primary), var(--indigo-light));
            border-radius: 10px;
        }

        .input-rose {
            background: #ffffff;
            border: 1.5px solid #E0E7FF;
            color: #1E1B4B;
            border-radius: 16px;
            padding: 12px;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .input-rose:focus {
            outline: none;
            border-color: var(--indigo-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-rose {
            background: linear-gradient(135deg, #4F46E5 0%, #3730A3 100%);
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
            transition: transform 0.1s;
        }
        .btn-rose:active { transform: scale(0.97); }

        .card-order { border-left: 6px solid var(--amber-accent); }
        .card-received { border-left: 6px solid var(--success-green); }

        .loader {
            border: 3px solid #E0E7FF;
            border-top: 3px solid var(--indigo-primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estilo para los filtros en Historial */
        .filter-container {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px -10px rgba(79, 70, 229, 0.1);
        }

        /* Badge de pendientes con color \u00e1mbar */
        #count-pendientes {
            background: linear-gradient(135deg, var(--amber-accent), var(--amber-dark));
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        /* Acento en header */
        .header-accent {
            background: linear-gradient(90deg, var(--indigo-primary), var(--indigo-light));
        }

        /* Icono de secci\u00f3n con gradiente \u00edndigo */
        .section-icon {
            background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
            color: var(--indigo-primary);
        }

        /* Chip de correlativo en pendientes */
        .chip-order {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            color: #92400E;
        }

        /* Nav bar con borde superior de acento */
        nav {
            border-top: 3px solid transparent;
            background-image: linear-gradient(white, white), linear-gradient(90deg, var(--indigo-primary), var(--amber-accent));
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        /* Bot\u00f3n de restablecer filtros */
        .btn-reset-filters {
            color: #9CA3AF;
            transition: color 0.2s;
        }
        .btn-reset-filters:hover {
            color: var(--indigo-primary);
        }

        /* Selector de estado activo en historial */
        .filtro-activo {
            background: white;
            color: var(--indigo-dark);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.12);
        }
        .filtro-inactivo {
            color: #9CA3AF;
        }
    </style>
</head>
<body class="pb-36">

    <header class="pt-14 pb-8 px-6 flex flex-col items-center">
        <div class="p-4 bg-white rounded-[2rem] shadow-sm border border-indigo-100">
            <img src="image.jpg" alt="CVC Logo" class="h-16 object-contain">
        </div>
        <div class="mt-6 flex flex-col items-center">
            <h1 class="text-[10px] tracking-[0.6em] uppercase font-black text-indigo-300">Gesti\u00f3n Viales</h1>
            <div class="w-10 h-1 header-accent mt-2 rounded-full"></div>
        </div>
    </header>

    <nav class="fixed bottom-8 left-6 right-6 z-50 soft-glass rounded-[2.5rem] px-2 py-4 border-white/60">
        <div class="flex justify-around items-center">
            <button onclick="switchTab('emitir')" id="tab-emitir" class="flex flex-col items-center gap-1 transition-all tab-active">
                <i class="fa-solid fa-plus-circle text-2xl"></i>
                <span class="text-[9px] uppercase font-extrabold tracking-tighter">Emitir</span>
            </button>
            <button onclick="switchTab('recibir')" id="tab-recibir" class="flex flex-col items-center gap-1 transition-all text-neutral-400">
                <i class="fa-solid fa-clipboard-check text-2xl"></i>
                <span class="text-[9px] uppercase font-extrabold tracking-tighter">Pendientes</span>
            </button>
            <button onclick="switchTab('historial')" id="tab-historial" class="flex flex-col items-center gap-1 transition-all text-neutral-400">
                <i class="fa-solid fa-folder-open text-2xl"></i>
                <span class="text-[9px] uppercase font-extrabold tracking-tighter">Historial</span>
            </button>
            <button onclick="switchTab('admin')" id="tab-admin" class="flex flex-col items-center gap-1 transition-all text-neutral-400">
                <i class="fa-solid fa-cog text-2xl"></i>
                <span class="text-[9px] uppercase font-extrabold tracking-tighter">Datos</span>
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-lg">
        
        <section id="view-emitir" class="space-y-6">
            <div class="soft-glass p-8 rounded-[3rem]">
                <div class="flex items-center gap-4 mb-8">
                    <span class="w-12 h-12 section-icon rounded-2xl flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-feather-pointed text-xl"></i>
                    </span>
                    <div>
                        <h2 class="text-2xl font-extrabold text-indigo-950 tracking-tight">Nueva Orden</h2>
                        <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Formulario de registro</p>
                    </div>
                </div>

                <form id="form-oc" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Fecha Emisi\u00f3n</label>
                            <input type="text" id="fecha-oc" readonly class="input-rose bg-neutral-100/30 font-mono text-xs">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Entrega Prevista</label>
                            <input type="date" id="fecha-entrega" class="input-rose text-xs">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Maquinaria</label>
                            <select id="select-maquinaria" class="input-rose appearance-none">
                                <option value="GENERAL">GENERAL</option>
                                <option value="CAMION">CAMI\u00d3N</option>
                                <option value="AUTO">AUTO</option>
                                <option value="NIVELADORA">NIVELADORA</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Obra Destino</label>
                            <select id="select-obra" class="input-rose appearance-none">
                                <option value="RUTA 1">RUTA 1</option>
                                <option value="RUTA 5">RUTA 5</option>
                                <option value="TALLER">TALLER</option>
                                <option value="CANTERA">CANTERA</option>
                                <option value="OFICINA">OFICINA</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Proveedor</label>
                            <select id="select-proveedor" required class="input-rose"><option value="">Seleccionar</option></select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Emisor</label>
                            <select id="select-emisor" required class="input-rose"><option value="">Seleccionar</option></select>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Presupuesto</label>
                        <div class="flex gap-2">
                            <select id="select-moneda" class="w-1/3 input-rose text-xs font-bold"><option value="PESOS">PESOS</option><option value="DOLARES">DOLARES</option></select>
                            <input type="number" id="input-precio" placeholder="0.00" class="flex-1 input-rose font-bold">
                            <select id="select-iva" class="w-1/3 input-rose text-[10px] font-bold"><option value="CON IVA">CON IVA</option><option value="SIN IVA">SIN IVA</option></select>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-neutral-400 uppercase ml-2">Detalle de Materiales</label>
                        <textarea id="detalle-oc" required rows="3" placeholder="Ej: Herramientas, Gasoil, Repuestos..." class="input-rose"></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full btn-rose py-5 rounded-2xl flex items-center justify-center gap-3 mt-6">
                        <i class="fa-solid fa-paper-plane"></i> Generar Orden
                    </button>
                </form>
            </div>
        </section>

        <section id="view-recibir" class="hidden space-y-6">
            <div class="flex items-center justify-between px-4">
                <h2 class="text-2xl font-extrabold text-indigo-950">Pendientes</h2>
                <span class="text-white text-[10px] font-black px-3 py-1.5 rounded-full shadow-lg" id="count-pendientes">0</span>
            </div>
            <div id="lista-pendientes" class="space-y-4"></div>
        </section>

        <section id="view-historial" class="hidden space-y-8">
            <div class="filter-container space-y-6">
                <div class="flex gap-2 p-1.5 bg-indigo-50 rounded-2xl">
                    <button onclick="setFiltroEstado('TODAS')" id="btn-filtro-todas" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl filtro-activo transition-all">Todas</button>
                    <button onclick="setFiltroEstado('PENDIENTE')" id="btn-filtro-p
