<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVC | Gestión de Órdenes de Compra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --cvc-black: #000000;
            --cvc-white: #ffffff;
            --cvc-gray: #1a1a1a;
        }

        body {
            background-color: var(--cvc-black);
            color: var(--cvc-white);
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        .tab-active {
            border-bottom: 4px solid var(--cvc-white);
            color: var(--cvc-white);
        }

        .input-vial {
            background-color: #121212;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
        }

        .card-oc {
            background-color: var(--cvc-gray);
            border: 1px solid #333;
            border-left: 6px solid var(--cvc-white);
        }

        .btn-primary {
            background-color: var(--cvc-white);
            color: var(--cvc-black);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a1a1a;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-24">

    <!-- HEADER -->
    <header class="bg-black py-6 flex flex-col items-center border-b border-gray-900">
        <img src="image.png" alt="CVC Logo" class="h-16 mb-2">
        <h1 class="text-[10px] tracking-[0.3em] uppercase opacity-50 font-bold text-white">Logística y Suministros Viales</h1>
    </header>

    <!-- NAVEGACIÓN -->
    <nav class="bg-[#0a0a0a] sticky top-0 z-50 border-b border-gray-800 shadow-2xl">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('emitir')" id="tab-emitir" class="flex-1 h-full font-bold uppercase text-[10px] flex flex-col justify-center items-center gap-1 tab-active">
                <i class="fa-solid fa-file-pen text-lg"></i>
                <span>Emitir OC</span>
            </button>
            <button onclick="switchTab('recibir')" id="tab-recibir" class="flex-1 h-full font-bold uppercase text-[10px] flex flex-col justify-center items-center gap-1 text-gray-500">
                <i class="fa-solid fa-clipboard-check text-lg"></i>
                <span>Recepción</span>
            </button>
            <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 h-full font-bold uppercase text-[10px] flex flex-col justify-center items-center gap-1 text-gray-500">
                <i class="fa-solid fa-database text-lg"></i>
                <span>Maestros</span>
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-lg">
        
        <!-- VISTA 1: EMISIÓN -->
        <section id="view-emitir" class="space-y-6">
            <div class="bg-[#111] p-6 rounded-2xl border border-gray-800">
                <form id="form-oc" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1 tracking-widest">Fecha y Hora</label>
                        <input type="text" id="fecha-oc" readonly class="input-vial font-mono text-gray-400 border-dashed">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1 tracking-widest">Proveedor</label>
                        <select id="select-proveedor" required class="input-vial bg-black">
                            <option value="">Cargando proveedores...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1 tracking-widest">Emisor Autorizado</label>
                        <select id="select-emisor" required class="input-vial bg-black">
                            <option value="">Cargando emisores...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1 tracking-widest">Detalle del Pedido</label>
                        <textarea id="detalle-oc" required rows="4" placeholder="Cantidades y materiales..." class="input-vial bg-black"></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="w-full btn-primary py-4 rounded-xl flex items-center justify-center gap-3">
                        <i class="fa-solid fa-paper-plane"></i> GENERAR ORDEN DE COMPRA
                    </button>
                </form>
            </div>
        </section>

        <!-- VISTA 2: RECEPCIÓN -->
        <section id="view-recibir" class="hidden space-y-4">
            <div id="lista-pendientes" class="space-y-3">
                <div class="text-center py-20 opacity-20"><i class="fa-solid fa-box-open text-5xl mb-4"></i><p>Sincronizando con la obra...</p></div>
            </div>
        </section>

        <!-- VISTA 3: MAESTROS -->
        <section id="view-admin" class="hidden space-y-6">
            <div class="bg-gray-900/50 p-4 rounded-xl text-[10px] text-gray-400 mb-4 border border-gray-800">
                <i class="fa-solid fa-info-circle mr-1"></i> Los nombres de proveedores y emisores que pasaste se cargan automáticamente al iniciar.
            </div>

            <div class="bg-[#111] p-6 rounded-2xl border border-gray-800">
                <h3 class="text-[10px] font-black uppercase mb-4 text-gray-400">Añadir Proveedor Extra</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuevo-prov" placeholder="Nombre" class="input-vial">
                    <button onclick="agregarMaestro('proveedores', 'nuevo-prov')" class="bg-white text-black px-4 rounded-lg font-bold">+</button>
                </div>
            </div>
            <div class="bg-[#111] p-6 rounded-2xl border border-gray-800">
                <h3 class="text-[10px] font-black uppercase mb-4 text-gray-400">Añadir Emisor Extra</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuevo-emisor" placeholder="Nombre" class="input-vial">
                    <button onclick="agregarMaestro('emisores', 'nuevo-emisor')" class="bg-white text-black px-4 rounded-lg font-bold">+</button>
                </div>
            </div>
        </section>
    </div>

    <!-- MODAL RECEPCIÓN -->
    <div id="modal-recepcion" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-[#111] w-full max-w-sm p-8 rounded-3xl border border-gray-800">
            <h3 class="text-xl font-black mb-4 text-center uppercase" id="modal-title">RECIBIR OC</h3>
            <input type="text" id="input-receptor" placeholder="Nombre de quien recibe" class="input-vial mb-6">
            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 border border-gray-700 py-4 rounded-xl text-xs uppercase font-bold text-white">Cerrar</button>
                <button onclick="confirmarRecepcion()" class="flex-1 btn-primary py-4 rounded-xl text-xs font-bold">Certificar</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ==========================================
        // CONFIGURACIÓN DE JUAN CARLOS INTEGRADA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBaETq5Inlj1h7jVoVOXJsSfxGK9i2uiMA",
            authDomain: "fir-cvc-e153e.firebaseapp.com",
            projectId: "fir-cvc-e153e",
            storageBucket: "fir-cvc-e153e.firebasestorage.app",
            messagingSenderId: "920360191032",
            appId: "1:920360191032:web:0aea153d1cc0785a0e52cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cvc-vial-prod';

        // Teléfono de contacto configurado
        const WHATSAPP_CONTACTO = "59894798639";

        // Rutas siguiendo la Regla 1
        const getPublicRef = (coll) => collection(db, 'artifacts', appId, 'public', 'data', coll);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await verificarYCargarMaestros();
                cargarProveedores();
                cargarEmisores();
                cargarOrdenes();
            } else {
                signInAnonymously(auth);
            }
        });

        async function verificarYCargarMaestros() {
            const provRef = getPublicRef('proveedores');
            const emisorRef = getPublicRef('emisores');

            const snapProv = await getDocs(provRef);
            if (snapProv.empty) {
                const nombres = ["FERRETERIA EL COSITO", "MANGUERAS CASTILLO", "ENGRANAJES LA TUERCA", "PAPELERIA SANCHEZ"];
                for (const n of nombres) await addDoc(provRef, { nombre: n });
            }

            const snapEmi = await getDocs(emisorRef);
            if (snapEmi.empty) {
                const nombres = ["JULIO RODRIGUEZ", "CARLOS PEREZ", "FERNANDO BLANCO", "AGUSTIN CENTURION"];
                for (const n of nombres) await addDoc(emisorRef, { nombre: n });
            }
        }

        window.switchTab = (tab) => {
            ['emitir', 'recibir', 'admin'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500');
        };

        const actualizarReloj = () => {
            const now = new Date();
            document.getElementById('fecha-oc').value = now.toLocaleString('es-UY');
            setTimeout(actualizarReloj, 30000);
        };
        actualizarReloj();

        function cargarProveedores() {
            onSnapshot(getPublicRef('proveedores'), (snap) => {
                const select = document.getElementById('select-proveedor');
                select.innerHTML = '<option value="">Seleccionar Proveedor</option>';
                const lista = [];
                snap.forEach(d => lista.push(d.data().nombre));
                lista.sort().forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`);
            }, (err) => console.error(err));
        }

        function cargarEmisores() {
            onSnapshot(getPublicRef('emisores'), (snap) => {
                const select = document.getElementById('select-emisor');
                select.innerHTML = '<option value="">Seleccionar Emisor</option>';
                const lista = [];
                snap.forEach(d => lista.push(d.data().nombre));
                lista.sort().forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`);
            }, (err) => console.error(err));
        }

        function cargarOrdenes() {
            onSnapshot(getPublicRef('ordenes'), (snap) => {
                const container = document.getElementById('lista-pendientes');
                let items = [];
                snap.forEach(d => { 
                    if(d.data().estado === 'PENDIENTE') items.push({id: d.id, ...d.data()}); 
                });
                
                items.sort((a,b) => b.timestamp - a.timestamp);
                
                if(items.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 opacity-30"><p>No hay órdenes pendientes</p></div>';
                    return;
                }
                container.innerHTML = items.map(o => `
                    <div onclick="abrirModal('${o.id}', '${o.correlativo}')" class="card-oc p-5 rounded-xl mb-3 active:scale-95 transition-transform">
                        <div class="flex justify-between font-black mb-2 text-white"><span>${o.correlativo}</span><span class="text-[9px] opacity-40">${o.fecha}</span></div>
                        <div class="text-sm font-bold uppercase text-gray-200">${o.proveedor}</div>
                        <div class="text-xs text-gray-500 italic mt-1">"${o.detalle}"</div>
                    </div>
                `).join('');
            }, (err) => console.error(err));
        }

        window.agregarMaestro = async (coll, inputId) => {
            const val = document.getElementById(inputId).value.trim();
            if(!val) return;
            try {
                await addDoc(getPublicRef(coll), { nombre: val.toUpperCase() });
                document.getElementById(inputId).value = '';
            } catch (e) { console.error(e); }
        };

        document.getElementById('form-oc').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> GENERANDO...';

            const prov = document.getElementById('select-proveedor').value;
            const emisor = document.getElementById('select-emisor').value;
            const detalle = document.getElementById('detalle-oc').value;
            const fecha = document.getElementById('fecha-oc').value;

            try {
                const snap = await getDocs(getPublicRef('ordenes'));
                const correlativo = `OC-${String(snap.size + 1).padStart(3, '0')}`;

                await addDoc(getPublicRef('ordenes'), {
                    correlativo, fecha, proveedor: prov, emisor, detalle, estado: 'PENDIENTE', timestamp: Date.now()
                });

                const text = `🚛 *CVC - NUEVA ORDEN DE COMPRA*%0A---------------------------%0A*Nro:* ${correlativo}%0A*Fecha:* ${fecha}%0A*Proveedor:* ${prov}%0A*Emisor:* ${emisor}%0A---------------------------%0A*Detalle:*%0A${detalle}`;
                
                document.getElementById('form-oc').reset();
                actualizarReloj();
                window.open(`https://wa.me/${WHATSAPP_CONTACTO}?text=${text}`, '_blank');
            } catch (err) {
                console.error(err);
                alert("Error al guardar. Reintente.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> GENERAR ORDEN DE COMPRA';
            }
        };

        let currentId, currentNum;
        window.abrirModal = (id, num) => {
            currentId = id; currentNum = num;
            document.getElementById('modal-recepcion').classList.remove('hidden');
        };

        window.cerrarModal = () => document.getElementById('modal-recepcion').classList.add('hidden');

        window.confirmarRecepcion = async () => {
            const rec = document.getElementById('input-receptor').value.trim();
            if(!rec) { alert("Indique quién recibe"); return; }
            
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'ordenes', currentId);
                const ahora = new Date().toLocaleString('es-UY');
                
                await updateDoc(ref, { 
                    estado: 'RECIBIDA', 
                    receptor: rec, 
                    fecha_recepcion: ahora 
                });

                const text = `✅ *CVC - CONFIRMACIÓN RECEPCIÓN*%0AOC *#${currentNum}* recibida por *${rec}* el día ${ahora}.`;
                cerrarModal();
                window.open(`https://wa.me/${WHATSAPP_CONTACTO}?text=${encodeURIComponent(text)}`, '_blank');
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
